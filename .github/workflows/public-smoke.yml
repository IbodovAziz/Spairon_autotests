name: Public Smoke CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-smoke:
    name: Public Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: "true"
      SPAIRON_APP_URL: https://app.spairon.ru
      SPAIRON_API_URL: https://server.spairon.ru

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public smoke tests
        run: npm run test:public

      - name: Upload public test report
        id: report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: public-playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish summary and notify on failure
        if: ${{ always() && github.event_name != 'pull_request' }}
        continue-on-error: true
        run: node scripts/ci-report.mjs
        env:
          JOB_STATUS: ${{ job.status }}
          NOTIFY_MODE: failures
          REPORT_URL: ${{ steps.report.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_LABEL: Public smoke CI
